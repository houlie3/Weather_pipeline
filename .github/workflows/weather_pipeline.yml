name: Weather Pipeline

on:
  schedule:
    # 18:00 UTC = 20:00 in Denmark during daylight saving time.
    # GitHub schedules use UTC and run on the default branch.
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-weather-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: python main.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/weather.db data/poem.txt
          git diff --cached --quiet || git commit -m "Update weather dashboard"
          git push
